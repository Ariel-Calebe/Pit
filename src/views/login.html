<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro - Co-Up</title>
</head>
<body>
    <h2 id="formTitle">Login</h2>

    <!-- Formulário de Login -->
    <form id="loginForm">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required>
        <br><br>
        <button type="submit">Entrar</button>
    </form>

    <!-- Formulário de Cadastro (inicialmente oculto) -->
    <form id="registerForm" style="display:none;">
        <label for="newEmail">Email:</label>
        <input type="email" id="newEmail" name="email" required>
        <br>
        <label for="newPassword">Senha:</label>
        <input type="password" id="newPassword" name="password" required>
        <br><br>
        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <button id="toggleButton">Cadastrar</button>

    <script>
        // Lidar com o envio do formulário de login
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Enviar dados para o backend para autenticação
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message === 'Login bem-sucedido!') {
                    window.location.href = '/home'; // Redirecionar para a página de home
                } else {
                    alert(data.message); // Exibir erro
                }
            })
            .catch(error => {
                alert('Erro ao fazer login.');
                console.error(error);
            });
        });

        // Lidar com o envio do formulário de cadastro
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;

            // Enviar dados para o backend (registro)
            fetch('/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message === 'Usuário registrado com sucesso!') {
                    alert('Cadastro realizado com sucesso!');
                    toggleForm();  // Alternar de volta para o formulário de login
                } else {
                    alert(data.message); // Exibir erro
                }
            })
            .catch(error => {
                alert('Erro ao cadastrar usuário.');
                console.error(error);
            });
        });

        // Função para alternar entre login e cadastro
        document.getElementById('toggleButton').addEventListener('click', toggleForm);

        function toggleForm() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const formTitle = document.getElementById('formTitle');
            const toggleButton = document.getElementById('toggleButton');

            if (loginForm.style.display === 'none') {
                // Mostrar login, ocultar cadastro
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                formTitle.innerText = 'Login';
                toggleButton.innerText = 'Cadastrar';
            } else {
                // Mostrar cadastro, ocultar login
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                formTitle.innerText = 'Cadastro';
                toggleButton.innerText = 'Já tem conta? Fazer login';
            }
        }
    </script>
</body>
</html>

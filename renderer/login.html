<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Co-Up - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    h2 {
      text-align: center;
    }
  </style>
</head>
<body>
  <form id="login-form">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="E-mail" required />
    <input type="password" id="login-senha" placeholder="Senha" required />
    <button type="submit">Entrar</button>
  </form>

  <form id="cadastro-form">
    <h2>Cadastro</h2>
    <input type="text" id="cadastro-nome" placeholder="Nome" required />
    <input type="email" id="cadastro-email" placeholder="E-mail" required />
    <input type="password" id="cadastro-senha" placeholder="Senha" required />
    <button type="submit">Cadastrar</button>
  </form>

  <button id="btn-google" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #db4437; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
  Entrar com Google
  </button>


  <script src="login.js"></script>
</body>
</html>
